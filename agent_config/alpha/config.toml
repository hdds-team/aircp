[agent]
id = "alpha"
rooms = ["#general", "#agents-only", "#brainstorm"]

[llm]
provider = "claude-stream"  # Migrated! Persistent process, no respawn
model = "opus"
max_tokens = 1024
skip_permissions = true  # Alpha = trusted agent, skip Claude CLI confirmations

[hdds]
domain_id = 219

[behavior]
respond_to_mentions = true
respond_to_all = false  # Répond même sans @alpha
max_context_messages = 50
memory_hours = 24
cooldown_seconds = 7.5  # Anti-spam: 7.5s min entre réponses

[compactor]
enabled = true
profile = "minimal"  # Large context (200k), keep more
# context_window = 200000  # Opus = ~200k tokens

# Capabilities d'Alpha (soft enforcement via SOUL)
# Alpha = agent principal avec écriture
[[capabilities]]
tool = "devit_file_read"
path = "/projects/*"

[[capabilities]]
tool = "devit_file_search"
path = "/projects/*"

[[capabilities]]
tool = "devit_project_structure"
path = "/projects/*"

[[capabilities]]
tool = "devit_file_list"
path = "/projects/*"

[[capabilities]]
tool = "devit_directory_list"
path = "/projects/*"

[[capabilities]]
tool = "devit_file_write"
path = "/projects/*"

[[capabilities]]
tool = "devit_patch_apply"
path = "/projects/*"

[[capabilities]]
tool = "devit_git_log"

[[capabilities]]
tool = "devit_git_diff"

[[capabilities]]
tool = "devit_git_blame"

[[capabilities]]
tool = "devit_git_show"

[[capabilities]]
tool = "devit_search_web"

# AIRCP coordination tools
[[capabilities]]
tool = "devit_aircp_send"

[[capabilities]]
tool = "devit_aircp_history"

[[capabilities]]
tool = "devit_aircp_join"

[[capabilities]]
tool = "devit_aircp_status"

[[capabilities]]
tool = "devit_aircp_claim"

[[capabilities]]
tool = "devit_aircp_lock"

[[capabilities]]
tool = "devit_aircp_presence"

# Exploration & analysis
[[capabilities]]
tool = "devit_explorer"
path = "/projects/*"

[[capabilities]]
tool = "devit_git_search"

# Vision & media
[[capabilities]]
tool = "devit_read_image"
path = "/projects/*"

[[capabilities]]
tool = "devit_read_pdf"
path = "/projects/*"

[[capabilities]]
tool = "devit_ocr"

# Web & network
[[capabilities]]
tool = "devit_fetch_url"

# Dev tooling
[[capabilities]]
tool = "devit_doctor"

[[capabilities]]
tool = "devit_cargo"

[[capabilities]]
tool = "devit_resource_monitor"

[[capabilities]]
tool = "devit_ports"

[[capabilities]]
tool = "devit_db_query"

[[capabilities]]
tool = "devit_journal_append"

# Write/exec tools (alpha only)
[[capabilities]]
tool = "devit_snapshot"

[[capabilities]]
tool = "devit_shell"

[[capabilities]]
tool = "devit_archive"
path = "/projects/*"

# Recreational Mode (IDEA #17 / WF#9)
[recreational]
enabled = true
idle_threshold_minutes = 10      # ~20 heartbeat cycles at 30s interval
max_posts_per_hour = 1
quiet_hours = "02:00-07:00"
global_cooldown_minutes = 30
activities = ["forum_post", "code_trivia"]

[recreational.weights]
forum_post = 1.5
code_trivia = 2.0
